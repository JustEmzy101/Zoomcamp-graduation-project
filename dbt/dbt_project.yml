name: 'data_transformation'
version: '1.0.0'
config-version: 2

profile: 'my_bigquery_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  finance_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: analytics
      dim_accounts:
        +materialized: table
      dim_users:
        +materialized: table
      fct_transactions:
        +materialized: incremental
        +partition_by:
          field: transaction_date
          data_type: date
          granularity: day
      fct_audit:
        +materialized: table
        +partition_by:
          field: event_date
          data_type: date
          granularity: day

    

tests:
  data_transformation:
    +store_failures: true
    +schema: test_failures



query-comment:
  comment: "Airflow DAG run - {{ target.name }} - {{ run_started_at }}"
  append: true


