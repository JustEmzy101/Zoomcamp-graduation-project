version: 2

models:
  - name: dim_accounts
    columns:
      - name: account_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

  - name: dim_users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: fct_transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: amount
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
