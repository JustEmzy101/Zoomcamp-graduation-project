apiVersion: v1
kind: Service
metadata:
  name: airbyte-webapp-svc
  namespace: airbyte
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: server   # we'll confirm this after checking labels
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
      nodePort: 30080
